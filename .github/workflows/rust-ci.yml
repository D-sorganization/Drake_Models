name: Rust CI
on:
  push:
    branches: [main]
    paths:
      - "rust_core/**"
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "rust_core/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  # ── Dispatcher: route to self-hosted if available ──────────────────────────
  pick-runner:
    runs-on: d-sorg-fleet
    timeout-minutes: 2
    outputs:
      runner: ${{ steps.check.outputs.runner }}
    steps:
      - name: Check for self-hosted runner
        id: check
        env:
          GH_TOKEN: ${{ secrets.RUNNER_CHECK_TOKEN }}
        run: |
          mkdir -p "$(dirname "$GITHUB_OUTPUT")"
          echo "runner=d-sorg-fleet" >> "$GITHUB_OUTPUT"
  rust-check:
    needs: pick-runner
    runs-on: ${{ needs.pick-runner.outputs.runner }}
    timeout-minutes: 15
    defaults:
      run:
        working-directory: rust_core
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust_core/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust_core/Cargo.lock') }}
      - name: Check Formatting
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Tests
        run: cargo test
