name: CI Standard
on:
  push:
    branches: [main]
    paths-ignore:
      - "LICENSE"
      - ".gitignore"
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - "LICENSE"
      - ".gitignore"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  # Dispatcher: route to self-hosted if available
  pick-runner:
    runs-on: d-sorg-fleet
    timeout-minutes: 2
    outputs:
      runner: ${{ steps.check.outputs.runner }}
    steps:
      - name: Check for self-hosted runner
        id: check
        env:
          GH_TOKEN: ${{ secrets.RUNNER_CHECK_TOKEN }}
        run: |
          mkdir -p "$(dirname "$GITHUB_OUTPUT")"
          echo "runner=d-sorg-fleet" >> "$GITHUB_OUTPUT"
  quality-gate:
    needs: pick-runner
    runs-on: ${{ needs.pick-runner.outputs.runner }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src scripts tests examples benchmarks

      - name: Check Formatting (ruff)
        run: ruff format --check src scripts tests examples benchmarks

      - run: mypy src --config-file pyproject.toml

      - name: Verify No Placeholders
        run: |
          violations=$(
            find . \( -path "./.git" -o -path "./.mypy_cache" -o -path "./.ruff_cache" -o -path "./__pycache__" -o -path "./scripts" \) -prune -o -type f -name "*.py" -print0 \
              | xargs -0 grep -nE "TODO|FIXME" || true
          )
          if [ -n "$violations" ]; then
            echo "$violations"
            echo "::error::Placeholders found. Remove TODOs/FIXMEs or create tracked GitHub issues."
            exit 1
          fi

      - name: Security Audit
        run: |
          python -m venv .audit-venv
          . .audit-venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install pip-audit
          pip-audit --skip-editable --ignore-vuln CVE-2026-3219

      - name: Bandit Security Scan
        run: bandit -r src/ -ll -ii --format txt

  tests:
    needs: [pick-runner, quality-gate]
    runs-on: ${{ needs.pick-runner.outputs.runner }}
    timeout-minutes: 15
    strategy:
      max-parallel: 1
      matrix:
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install Dependencies
        run: pip install -e ".[dev]"

      - name: Run Test Suite
        run: |
          python3 -m pytest \
            -p no:xvfb \
            -p no:pytest_xvfb \
            --timeout=60 \
            --timeout-method=thread \
            -m "not slow and not requires_drake" \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-config=pyproject.toml \
            --cov-fail-under=80 \
            --tb=short \
            -v

  local-only-workflows:
    name: Reject hosted runner routing
    runs-on: ubuntu-latest
    steps:
      - name: Dummy
        run: echo "passed"
