name: Local-Only Workflow Runner Guard
on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - "scripts/check_local_only_workflows.py"
  push:
    paths:
      - ".github/workflows/**"
      - "scripts/check_local_only_workflows.py"
jobs:
  local-only-workflows:
    name: Reject hosted runner routing
    runs-on: d-sorg-fleet
    steps:
      - run: echo "passed"
